<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RKW ASN Agent v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0e0f11;--surface:#16181c;--surface2:#1e2026;
  --border:#2a2d35;--accent:#00d4aa;--accent2:#0099ff;
  --warn:#ffaa00;--danger:#ff5555;--text:#e8eaf0;--muted:#6b7280;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;line-height:1.6}
.header{padding:24px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:4px 10px;letter-spacing:.08em}
.b1{background:var(--accent);color:#000}.b2{background:var(--accent2);color:#000}
h1{font-size:15px;font-weight:400;letter-spacing:.02em}
.hright{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
.upload-zone{margin:28px 32px;border:1px dashed var(--border);background:var(--surface);padding:44px 32px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--surface2)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uicon{width:42px;height:42px;margin:0 auto 14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.uicon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.5}
.utitle{font-size:13px;font-weight:500;margin-bottom:6px}
.uhint{font-family:var(--mono);font-size:11px;color:var(--muted)}
.status{margin:0 32px;background:var(--surface);border:1px solid var(--border);padding:10px 16px;font-family:var(--mono);font-size:12px;color:var(--muted);display:none;align-items:center;gap:10px}
.status.show{display:flex}
.sdot{width:7px;height:7px;flex-shrink:0}
.status.loading .sdot{background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.status.done .sdot{background:var(--accent)}
.status.err .sdot{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.out{margin:22px 32px 40px;display:none}
.out.show{display:block}
.disc-banner{background:#1a0a0a;border:1px solid var(--danger);padding:12px 16px;margin-bottom:14px;font-family:var(--mono);font-size:12px;color:var(--danger);display:none}
.disc-banner.show{display:block}
.vessel-banner{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 20px;margin-bottom:14px;display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start}
.vname{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--accent);letter-spacing:.05em}
.vpend{font-family:var(--mono);font-size:12px;color:var(--warn)}
.vd{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:3px}
.vd span{color:var(--text)}
.smgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.smcard{background:var(--surface);border:1px solid var(--border);padding:12px 14px}
.smlabel{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px}
.smval{font-size:15px;font-weight:500}
.smval.ok{color:var(--accent)}.smval.warn{color:var(--warn)}.smval.info{color:var(--accent2)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.btn{font-family:var(--mono);font-size:12px;padding:9px 18px;cursor:pointer;border:1px solid;letter-spacing:.04em;transition:all .15s;display:flex;align-items:center;gap:7px;background:transparent}
.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.btn-xl{background:var(--accent);border-color:var(--accent);color:#000}
.btn-xl:hover{background:#00f0c0}
.btn-word{background:var(--accent2);border-color:var(--accent2);color:#000}
.btn-word:hover{opacity:.85}
.btn-sec{border-color:var(--border);color:var(--text)}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.sec-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
.tbl-wrap{overflow-x:auto;margin-bottom:22px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:9px 11px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:var(--surface)}
tbody td{padding:9px 11px;font-family:var(--mono);font-size:12px;white-space:nowrap}
tfoot td{padding:9px 11px;font-family:var(--mono);font-size:12px;font-weight:500;border-top:1px solid var(--border);background:var(--surface2)}
.td-po{color:var(--accent)}.td-item{color:var(--accent2);font-weight:500}
.bk{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 7px}
.bk-ok{background:#1a3a2a;color:#4caf81}
.bk-bk{background:#1a2a3a;color:var(--accent2)}
.bk-diff{background:#3a1a1a;color:var(--danger)}
.bk-pend{background:#2a2200;color:var(--warn)}
</style>
</head>
<body>

<div class="header">
  <span class="badge b1">ASN AGENT v2</span>
  <span class="badge b2">JSON + XML</span>
  <h1>ESP Advanced Shipping Notice — RKW / K&amp;N</h1>
  <div class="hright">Excel · Word · JSON outputs</div>
</div>

<div class="upload-zone" id="dropZone">
  <input type="file" id="fileInput" accept=".json,.xml"/>
  <div class="uicon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
  <div class="utitle">Upload ASN file from ESP / K&amp;N</div>
  <div class="uhint">JSON or XML · drag and drop or click to browse</div>
</div>

<div class="status" id="status"><div class="sdot"></div><span id="stxt">Reading...</span></div>
<div class="out" id="output"></div>

<script>
const PORTS={CNTAO:'Qingdao, China',CNNGB:'Ningbo, China',CNSHA:'Shanghai, China',GBFXT:'Felixstowe, UK',GBTIL:'Tilbury, UK'};
const EC={BK:'Booking confirmed',GR:'Goods received',SH:'Shipped'};

document.getElementById('fileInput').addEventListener('change',e=>{if(e.target.files[0])go(e.target.files[0])});
const dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');if(e.dataTransfer.files[0])go(e.dataTransfer.files[0])});

function status(msg,state='loading'){
  const el=document.getElementById('status');
  el.className='status show '+state;
  document.getElementById('stxt').textContent=msg;
}

function go(file){
  status('Reading '+file.name+'...');
  const r=new FileReader();
  r.onload=e=>{
    try{
      const data=file.name.toLowerCase().endsWith('.xml')?fromXML(e.target.result):fromJSON(e.target.result);
      window._asnData=data;
      status('Parsed '+data.lines.length+' PO lines — '+file.name,'done');
      render(data);
    }catch(err){status('Error: '+err.message,'err');console.error(err);}
  };
  r.readAsText(file);
}

/* JSON parser */
function fromJSON(str){
  const raw=JSON.parse(str);
  const env=raw.ASNEnvelope;
  const h=env.ASNHeaderIdentifier;
  const header={
    envelopeId:h.EnvelopeIdentification||'',sender:h.SenderIdentification||'',
    receiver:h.ReceiverIdentification||'',transDate:h.TransDate||'',transTime:h.TransTime||''
  };
  let evs=env.ASNPurchaseOrderEvent;
  if(!Array.isArray(evs))evs=[evs];
  return {header,lines:evs.map(ev=>mapEv(
    ev.EventIdentifer,ev.LineDeliveryOrder,ev.Transportation,
    ev.VesselInformation,ev.VolumeInformation,ev.ContainerInformation,ev.ClearanceInformation
  ))};
}

/* XML parser — converts to same structure */
function fromXML(str){
  const doc=new DOMParser().parseFromString(str,'application/xml');
  const g=(p,t)=>{const el=p?p.querySelector(t):null;return el?el.textContent.trim():''};
  const hEl=doc.querySelector('ASNHeaderIdentifier');
  const header={
    envelopeId:g(hEl,'EnvelopeIdentification'),sender:g(hEl,'SenderIdentification'),
    receiver:g(hEl,'ReceiverIdentification'),transDate:g(hEl,'TransDate'),transTime:g(hEl,'TransTime')
  };
  const lines=[];
  doc.querySelectorAll('ASNPurchaseOrderEvent').forEach(ev=>lines.push(mapEv(
    {EventCode:g(ev,'EventCode'),PONumber:g(ev,'PONumber'),LineNumber:g(ev,'LineNumber'),ItemNumber:g(ev,'ItemNumber')},
    {StatusEntryDate:g(ev,'StatusEntryDate'),StatusEntryTime:g(ev,'StatusEntryTime'),OrderQty:g(ev,'OrderQty'),AdvisedQuantity:g(ev,'AdvisedQuantity')},
    {ModeOfTransport:g(ev,'ModeOfTransport'),PortOfDeparture:g(ev,'PortOfDeparture'),PortOfArrival:g(ev,'PortOfArrival'),TypeOfLoading:g(ev,'TypeOfLoading'),Carrier:g(ev,'Carrier')},
    {ETS:g(ev,'ETS'),ETA:g(ev,'ETA'),VesselName:g(ev,'VesselName'),VoyageNo:g(ev,'VoyageNo'),ATS:g(ev,'ATS'),ATA:g(ev,'ATA')},
    {VolumeCBM:g(ev,'VolumeCBM'),NumberOfCartons:g(ev,'NumberOfCartons')},
    {WeightByLine:g(ev,'WeightByLine'),VolumeByLine:g(ev,'VolumeByLine'),ContainerWeight:g(ev,'ContainerWeight'),ContainerVolume:g(ev,'ContainerVolume'),OceanBillOfLading:g(ev,'OceanBillOfLading'),ContainerNumber:g(ev,'ContainerNumber'),ContainerSize:g(ev,'ContainerSize'),SealNumber:g(ev,'SealNumber'),TrackingNo:g(ev,'TrackingNo')},
    {ClearanceDate:g(ev,'ClearanceDate'),EntryNumber:g(ev,'EntryNumber')}
  )));
  return {header,lines};
}

/* shared field mapper */
function mapEv(id,ldo,tr,v,vol,c,cl){
  const s=x=>(x||'').toString().trim();
  return {
    eventCode:s(id?.EventCode),poNumber:s(id?.PONumber),lineNumber:s(id?.LineNumber),itemNumber:s(id?.ItemNumber),
    statusDate:s(ldo?.StatusEntryDate),statusTime:s(ldo?.StatusEntryTime),orderQty:s(ldo?.OrderQty),advisedQty:s(ldo?.AdvisedQuantity),
    transport:s(tr?.ModeOfTransport),portDep:s(tr?.PortOfDeparture),portArr:s(tr?.PortOfArrival),typeLoading:s(tr?.TypeOfLoading),carrier:s(tr?.Carrier),
    ets:s(v?.ETS),eta:s(v?.ETA),vesselName:s(v?.VesselName),voyageNo:s(v?.VoyageNo),ats:s(v?.ATS),ata:s(v?.ATA),
    volumeCBM:s(vol?.VolumeCBM),numCartons:s(vol?.NumberOfCartons),
    weightByLine:s(c?.WeightByLine),volumeByLine:s(c?.VolumeByLine),containerWeight:s(c?.ContainerWeight),containerVolume:s(c?.ContainerVolume),
    billOfLading:s(c?.OceanBillOfLading),containerNumber:s(c?.ContainerNumber),containerSize:s(c?.ContainerSize),sealNumber:s(c?.SealNumber),trackingNo:s(c?.TrackingNo),
    clearanceDate:s(cl?.ClearanceDate),entryNumber:s(cl?.EntryNumber)
  };
}

function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function n(v){const x=Number(v);return isNaN(x)?0:x;}
function uniq(arr){return[...new Set(arr)];}
function portLbl(c){return c?(PORTS[c]?c+' · '+PORTS[c]:c):'—';}

function render(data){
  const {header,lines}=data;
  const pos=uniq(lines.map(l=>l.poNumber));
  const vessels=uniq(lines.map(l=>l.vesselName).filter(Boolean));
  const carriers=uniq(lines.map(l=>l.carrier).filter(Boolean));
  const ecs=uniq(lines.map(l=>l.eventCode));
  const totalOrd=lines.reduce((s,l)=>s+n(l.orderQty),0);
  const totalAdv=lines.reduce((s,l)=>s+n(l.advisedQty),0);
  const totalCBM=lines.reduce((s,l)=>s+n(l.volumeCBM),0);
  const allMatch=totalOrd===totalAdv;
  const f=lines[0]||{};
  const vesselPending=!vessels.length;

  let h='';
  h+=`<div class="disc-banner ${allMatch?'':'show'}">⚠ QUANTITY DISCREPANCY — one or more lines have ordered qty ≠ advised qty. Review highlighted rows below and alert Tim.</div>`;

  h+=`<div class="vessel-banner">
    <div><div class="smlabel" style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px">Vessel</div>
    ${vesselPending?`<div class="vpend">Pending — vessel not yet confirmed</div>`:`<div class="vname">${vessels.join(', ')}</div>`}</div>
    <div>
      <div class="vd">Voyage&nbsp;&nbsp;&nbsp;<span>${f.voyageNo||'Pending'}</span></div>
      <div class="vd">Carrier&nbsp;&nbsp;&nbsp;<span>${carriers.join(', ')||'—'}</span></div>
      <div class="vd">Event&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span>${ecs.map(e=>EC[e]||e).join(', ')}</span></div>
    </div>
    <div>
      <div class="vd">ETS (ship)&nbsp;<span>${fmtDate(f.ets)}</span></div>
      <div class="vd">ETA (arr.)&nbsp;&nbsp;<span style="color:var(--accent)">${fmtDate(f.eta)}</span></div>
    </div>
    <div>
      <div class="vd">Departure&nbsp;<span>${portLbl(f.portDep)}</span></div>
      <div class="vd">Arrival&nbsp;&nbsp;&nbsp;<span>${portLbl(f.portArr)}</span></div>
    </div>
  </div>`;

  h+=`<div class="smgrid">
    <div class="smcard"><div class="smlabel">Envelope ID</div><div class="smval info">${header.envelopeId}</div></div>
    <div class="smcard"><div class="smlabel">Trans date</div><div class="smval">${fmtDate(header.transDate)}</div></div>
    <div class="smcard"><div class="smlabel">Purchase orders</div><div class="smval info">${pos.length}</div></div>
    <div class="smcard"><div class="smlabel">PO lines</div><div class="smval">${lines.length}</div></div>
    <div class="smcard"><div class="smlabel">Total ordered</div><div class="smval ${allMatch?'ok':'warn'}">${totalOrd.toLocaleString()}</div></div>
    <div class="smcard"><div class="smlabel">Total advised</div><div class="smval ${allMatch?'ok':'warn'}">${totalAdv.toLocaleString()}</div></div>
    <div class="smcard"><div class="smlabel">Qty match</div><div class="smval ${allMatch?'ok':'warn'}">${allMatch?'YES ✓':'NO ⚠'}</div></div>
    <div class="smcard"><div class="smlabel">Volume CBM</div><div class="smval">${totalCBM.toFixed(3)}</div></div>
  </div>`;

  h+=`<div class="actions">
    <button class="btn btn-xl" onclick="dlExcel()">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Download Excel
    </button>
    <button class="btn btn-word" onclick="dlWord()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Download Word Report
    </button>
    <button class="btn btn-sec" onclick="dlJSON()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Download Parsed JSON
    </button>
  </div>`;

  h+=`<div class="sec-title">Purchase order lines</div>
  <div class="tbl-wrap"><table>
  <thead><tr>
    <th>Event</th><th>PO Number</th><th>Line</th><th>Item Number</th>
    <th>Status Date</th><th>Ordered Qty</th><th>Advised Qty</th><th>Match</th>
    <th>Volume CBM</th><th>Tracking No</th><th>Port Dep.</th><th>Port Arr.</th><th>Carrier</th>
  </tr></thead><tbody>`;

  lines.forEach(l=>{
    const match=l.orderQty===l.advisedQty;
    const ec=l.eventCode;
    h+=`<tr>
      <td><span class="bk ${ec==='GR'?'bk-ok':ec==='BK'?'bk-bk':'bk-pend'}">${ec}</span></td>
      <td class="td-po">${l.poNumber}</td>
      <td>${l.lineNumber}</td>
      <td class="td-item">${l.itemNumber}</td>
      <td>${fmtDate(l.statusDate)}</td>
      <td>${n(l.orderQty).toLocaleString()}</td>
      <td>${n(l.advisedQty).toLocaleString()}</td>
      <td><span class="bk ${match?'bk-ok':'bk-diff'}">${match?'MATCH':'DIFF'}</span></td>
      <td>${l.volumeCBM||'—'}</td>
      <td style="color:var(--muted)">${l.trackingNo||'—'}</td>
      <td>${l.portDep||'—'}</td>
      <td>${l.portArr||'—'}</td>
      <td>${l.carrier||'—'}</td>
    </tr>`;
  });

  h+=`</tbody><tfoot><tr>
    <td colspan="5">TOTALS</td>
    <td>${totalOrd.toLocaleString()}</td>
    <td>${totalAdv.toLocaleString()}</td>
    <td><span class="bk ${allMatch?'bk-ok':'bk-diff'}">${allMatch?'ALL OK':'CHECK'}</span></td>
    <td>${totalCBM.toFixed(3)}</td>
    <td colspan="4"></td>
  </tr></tfoot></table></div>`;

  document.getElementById('output').innerHTML=h;
  document.getElementById('output').className='out show';
}

/* Excel download — 2 sheets */
function dlExcel(){
  const {header,lines}=window._asnData;
  const wb=XLSX.utils.book_new();

  const cols=['Envelope ID','Trans Date','Sender','Receiver','Event Code','PO Number','Line','Item Number',
    'Status Date','Status Time','Ordered Qty','Advised Qty','Qty Match','Volume CBM','Num Cartons',
    'Transport','Port Dep.','Port Arr.','Type Loading','Carrier',
    'ETS','ETA','Vessel Name','Voyage No','ATS','ATA',
    'Wt By Line','Vol By Line','Container Wt','Container Vol',
    'Container No','Container Size','Seal No','Tracking No','Bill of Lading','Clearance Date','Entry No'];

  const rows=[cols];
  lines.forEach(l=>rows.push([
    header.envelopeId,header.transDate,header.sender,header.receiver,
    l.eventCode,l.poNumber,l.lineNumber,l.itemNumber,
    l.statusDate,l.statusTime,n(l.orderQty),n(l.advisedQty),
    l.orderQty===l.advisedQty?'MATCH':'MISMATCH',
    n(l.volumeCBM),n(l.numCartons),
    l.transport,l.portDep,l.portArr,l.typeLoading,l.carrier,
    l.ets,l.eta,l.vesselName,l.voyageNo,l.ats,l.ata,
    n(l.weightByLine),n(l.volumeByLine),n(l.containerWeight),n(l.containerVolume),
    l.containerNumber,l.containerSize,l.sealNumber,l.trackingNo,
    l.billOfLading,l.clearanceDate,l.entryNumber
  ]));

  const ws1=XLSX.utils.aoa_to_sheet(rows);
  ws1['!cols']=cols.map(()=>({wch:14}));
  XLSX.utils.book_append_sheet(wb,ws1,'PO Lines');

  const pos=uniq(lines.map(l=>l.poNumber));
  const vessels=uniq(lines.map(l=>l.vesselName).filter(Boolean));
  const totalOrd=lines.reduce((s,l)=>s+n(l.orderQty),0);
  const totalAdv=lines.reduce((s,l)=>s+n(l.advisedQty),0);
  const totalCBM=lines.reduce((s,l)=>s+n(l.volumeCBM),0);

  const sum=[
    ['RKW ASN SUMMARY REPORT',''],['',''],
    ['HEADER',''],
    ['Envelope ID',header.envelopeId],
    ['Sender',header.sender+' (K&N)'],
    ['Receiver',header.receiver],
    ['Transaction date',fmtDate(header.transDate)+' '+header.transTime],
    ['',''],
    ['VESSEL',''],
    ['Vessel',vessels[0]||'Pending'],
    ['Voyage No',lines[0]?.voyageNo||'Pending'],
    ['Carrier',uniq(lines.map(l=>l.carrier)).join(', ')],
    ['ETS',fmtDate(lines[0]?.ets)||'Pending'],
    ['ETA',fmtDate(lines[0]?.eta)||'Pending'],
    ['Port departure',lines[0]?.portDep||'—'],
    ['Port arrival',lines[0]?.portArr||'—'],
    ['',''],
    ['SUMMARY',''],
    ['Purchase orders',pos.join(', ')],
    ['Total PO lines',lines.length],
    ['Total ordered qty',totalOrd],
    ['Total advised qty',totalAdv],
    ['Qty match',totalOrd===totalAdv?'YES — ALL MATCH':'NO — DISCREPANCY'],
    ['Total volume CBM',totalCBM.toFixed(3)],
    ['',''],
    ['Generated',new Date().toLocaleString('en-GB')],
  ];
  const ws2=XLSX.utils.aoa_to_sheet(sum);
  ws2['!cols']=[{wch:24},{wch:40}];
  XLSX.utils.book_append_sheet(wb,ws2,'Summary');

  XLSX.writeFile(wb,`ASN_${header.envelopeId}_${header.transDate}.xlsx`);
}

/* Word report — RTF format (opens in Word) */
function dlWord(){
  const {header,lines}=window._asnData;
  const pos=uniq(lines.map(l=>l.poNumber));
  const vessels=uniq(lines.map(l=>l.vesselName).filter(Boolean));
  const carriers=uniq(lines.map(l=>l.carrier).filter(Boolean));
  const ecs=uniq(lines.map(l=>l.eventCode));
  const totalOrd=lines.reduce((s,l)=>s+n(l.orderQty),0);
  const totalAdv=lines.reduce((s,l)=>s+n(l.advisedQty),0);
  const totalCBM=lines.reduce((s,l)=>s+n(l.volumeCBM),0);
  const allMatch=totalOrd===totalAdv;
  const f=lines[0]||{};

  let rtf=`{\\rtf1\\ansi\\deff0
{\\fonttbl{\\f0 Arial;}}
{\\colortbl;\\red0\\green0\\blue0;\\red0\\green120\\blue80;\\red200\\green100\\blue0;\\red180\\green0\\blue0;\\red0\\green80\\blue160;}
\\paperw12240\\paperh15840\\margl1440\\margr1440\\margt1440\\margb1440

{\\f0\\fs28\\b RKW Purchase Order Report\\b0\\par}
{\\f0\\fs18\\cf5 Advanced Shipping Notice | ESP / K&N Integration\\cf0\\par}

/* Parsed JSON download */
function dlJSON(){
  const blob=new Blob([JSON.stringify(window._asnData,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ASN_Parsed_${window._asnData.header.envelopeId}.json`;
  a.click();
}

function uniq(arr){return[...new Set(arr)];}
function fmtDate(d){if(!d)return'—';const p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;}
function n(v){const x=Number(v);return isNaN(x)?0:x;}
function portLbl(c){return c?(PORTS[c]?c+' · '+PORTS[c]:c):'—';}
